# Day 21 — CI/CD for the serverless-agent (day-21-cicd stack).
#
# 키리스(OIDC): 저장된 AWS 키 없음. deploy job 이 GitHub 단명 토큰으로 AWS 역할을 빌린다.
#   필요한 GitHub 설정(Settings → Secrets and variables → Actions):
#     Variables:  AWS_DEPLOY_ROLE_ARN (= Day21PipelineStack 의 GithubDeployRoleArn),  ALERT_EMAIL(옵션)
#     Secrets:    DISCORD_PUBLIC_KEY,  CALENDAR_ICS_URL
#
# push/PR 엔 synth(검증)만 — 비용 0, 실수 배포 방지. 실제 배포는 수동(workflow_dispatch).

name: serverless-agent CI/CD

on:
  pull_request:
    paths: ['day-21-cicd/**', '.github/workflows/serverless-agent.yml']
  push:
    paths: ['day-21-cicd/**']
  workflow_dispatch: {}

permissions:
  id-token: write   # OIDC 토큰 발급에 필요
  contents: read

defaults:
  run:
    working-directory: day-21-cicd

jobs:
  synth:
    name: cdk synth (validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: day-21-cicd/package-lock.json
      - run: npm ci
      # synth 는 AWS 자격증명/실제 값 불필요 — 더미 context 로 합성만 검증한다.
      - run: npx cdk synth -c discordPublicKey=dummy -c calendarIcsUrl=https://example.com/c.ics

  deploy:
    name: cdk deploy (manual)
    if: github.event_name == 'workflow_dispatch'
    needs: synth
    runs-on: ubuntu-latest
    environment: production   # GitHub 환경 보호 규칙(승인 등)을 걸 수 있는 자리
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: day-21-cicd/package-lock.json
      - run: npm ci
      - name: Configure AWS credentials (OIDC, keyless)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy agent stack
        run: >-
          npx cdk deploy Day21CicdStack --require-approval never
          -c discordPublicKey=${{ secrets.DISCORD_PUBLIC_KEY }}
          -c calendarIcsUrl=${{ secrets.CALENDAR_ICS_URL }}
          -c alertEmail=${{ vars.ALERT_EMAIL }}
